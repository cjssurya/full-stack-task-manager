<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [tasks, setTasks] = useState([]);
            const [newTask, setNewTask] = useState('');
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            // UPDATED: Using 127.0.0.1 to avoid local DNS/CORS issues
            const API_URL = 'https://full-stack-task-manager-wv2u.onrender.com/api';

            const handleAuth = async (e) => {
                e.preventDefault();
                const endpoint = isLogin ? '/auth/login' : '/auth/signup';
                try {
                    const res = await axios.post(API_URL + endpoint, { email, password });
                    if (isLogin) {
                        localStorage.setItem('token', res.data.token);
                        setToken(res.data.token);
                    } else {
                        alert("Account created! Please sign in.");
                        setIsLogin(true);
                    }
                } catch (err) { 
                    console.error("Auth Error:", err);
                    alert(err.response?.data?.message || "Authentication failed. Check if server is running."); 
                }
            };

            const fetchTasks = async () => {
                try {
                    const res = await axios.get(`${API_URL}/tasks`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    setTasks(res.data);
                } catch (err) { console.error("Fetch Tasks Error:", err); }
            };

            const addTask = async (e) => {
                e.preventDefault();
                if(!newTask) return;
                try {
                    await axios.post(`${API_URL}/tasks`, { title: newTask }, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    setNewTask('');
                    fetchTasks();
                } catch (err) { console.error("Add Task Error:", err); }
            };

            const logout = () => {
                localStorage.removeItem('token');
                setToken(null);
            };

            useEffect(() => { if (token) fetchTasks(); }, [token]);

            if (!token) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100">
                            <h2 className="text-3xl font-black text-slate-800 mb-2 text-center">
                                {isLogin ? 'Welcome Back' : 'Create Account'}
                            </h2>
                            <p className="text-slate-500 text-center mb-8">Manage your tasks with ease.</p>
                            <form onSubmit={handleAuth} className="space-y-4">
                                <input type="email" placeholder="Email Address" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition text-slate-700" onChange={e => setEmail(e.target.value)} required />
                                <input type="password" placeholder="Password" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition text-slate-700" onChange={e => setPassword(e.target.value)} required />
                                <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition active:scale-95">
                                    {isLogin ? 'Sign In' : 'Get Started'}
                                </button>
                            </form>
                            <button onClick={() => setIsLogin(!isLogin)} className="w-full mt-6 text-slate-600 text-sm font-medium hover:text-blue-600">
                                {isLogin ? "Don't have an account? Sign up" : "Already have an account? Log in"}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto py-12 px-6">
                    <header className="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div>
                            <h1 className="text-2xl font-black text-slate-800">Dashboard</h1>
                            <p className="text-sm text-slate-500">You have {tasks.length} tasks</p>
                        </div>
                        <button onClick={logout} className="text-slate-400 hover:text-red-500 font-bold transition">Logout</button>
                    </header>

                    <form onSubmit={addTask} className="flex gap-3 mb-10">
                        <input value={newTask} onChange={e => setNewTask(e.target.value)} className="flex-1 px-6 py-4 rounded-2xl border border-slate-200 bg-white shadow-inner outline-none focus:border-blue-400 transition text-slate-700" placeholder="Write a new task..." />
                        <button type="submit" className="bg-slate-900 text-white px-8 rounded-2xl font-bold hover:bg-slate-800 transition active:scale-95 shadow-lg">Add Task</button>
                    </form>

                    <div className="space-y-4">
                        {tasks.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">
                                No tasks yet. Start being productive!
                            </div>
                        ) : (
                            tasks.map(task => (
                                <div key={task.id} className="group bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center hover:shadow-md transition">
                                    <span className="text-lg font-semibold text-slate-700">{task.title}</span>
                                    <span className="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-black uppercase rounded-full">
                                        {task.status}
                                    </span>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
